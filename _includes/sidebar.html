<aside class="menu">
  <p class="menu-label code-font has-text-grey-light has-text-weight-semibold">
    Latest Musings
  </p>
  <ul class="menu-list" id="latest-posts">
    {% for post in collections.posts | limit: 5 %}
    <li>
      <a href="{{ post.url }}" class="is-flex is-align-items-center">
        <span class="icon is-small mr-2 has-text-link">
          <i data-lucide="file-text"></i>
        </span>
        <span class="is-size-6">{{ post.data.title }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
  <p class="menu-label code-font has-text-grey-light has-text-weight-semibold">
    Subscribe
  </p>
  <ul class="menu-list" id="follow">
    <li><a href="/blog/feed.rss" class="is-flex is-align-items-center">
      <span class="icon is-small mr-2 has-text-link"><i data-lucide="rss"></i></span>
      <span class="is-size-6">RSS</span>
    </a></li>
  </ul>
</aside>
