---
layout: blog
---

<article>
  <div class="blog_post content box" style="border-radius: 12px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
    <header>
      <div id="{{ page.url | replace: '/', '-' }}"></div>
      <h2 class="blog_post_title is-size-2-tablet is-size-4-mobile">
        <a href="{{ page.url }}" rel="bookmark" title="{{ title }}">
          {{ title }}
        </a>
      </h2>
      <p class="mb-5 has-text-grey-light">
        <small class="is-flex is-align-items-center">
          <span class="icon is-small mr-1"><i data-lucide="calendar"></i></span>
          <span class="is-italic">{{ page.date | date: "%B %d, %Y" }}</span>
        </small>
      </p>
    </header>

    <div class="post_prose is-size-5-desktop">
      {{ content }}
    </div>
  </div>
</article>
