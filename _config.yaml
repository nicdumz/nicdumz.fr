# Jekyll config
sass:
  style: compact # possible values: nested expanded compact compressed
  load_paths:
    - node_modules
exclude:
  - "*.nix"
  - "*.json"
  - "*.yaml"
  - LICENSE.txt
  - node
  - "**README.md"
  
permalink: /blog/:year/:month/:title
timezone: Europe/Zurich
defaults:
  - scope:
      path: "assets/images"
    values:
      image: true
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

